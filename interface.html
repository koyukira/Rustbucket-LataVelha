<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lata Velha</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #f5f5f0;
    --bg3:       #e2e2dc;
    --border:    #c8c8c0;
    --accent:    #1a6cb5;
    --accent2:   #8b3ea8;
    --text:      #2a2a2a;
    --text-hl:   #0d0d0d;
    --muted:     #6a6a6a;
    --ok:        #2d7a3a;
    --err:       #c0392b;
    --warn:      #b8670a;
    --font-ui:   'Syne', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-code);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────── */
  #header {
    flex-shrink: 0;
    height: 54px;
    background: #fff;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    padding: 0 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    z-index: 10;
  }
  .logo { font-family:var(--font-ui); font-weight:800; font-size:15px; letter-spacing:.10em; color:var(--accent); text-transform:uppercase; white-space:nowrap; }
  .sep  { width:1px; height:24px; background:var(--border); flex-shrink:0; }
  #lbl-projeto { flex:1; font-size:14px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
  .btn {
    font-family:var(--font-ui); font-size:13px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
    padding:6px 14px; border:1.5px solid var(--border); border-radius:4px;
    background:#fff; color:var(--text); cursor:pointer; transition:all .15s; white-space:nowrap; flex-shrink:0;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .btn:hover { border-color:var(--accent); color:var(--accent); background:#f0f6ff; }
  .btn.run   { border-color:#2d7a3a; color:#2d7a3a; background:#f0faf2; }
  .btn.run:hover { background:#2d7a3a; color:#fff; }
  .btn.stop  { border-color:var(--err); color:var(--err); background:#fef5f5; }
  .btn.stop:hover { background:var(--err); color:#fff; }
  .btn:disabled { opacity:.35; cursor:default; }
  #dot { width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s;flex-shrink:0; }
  #dot.ativo { background:var(--ok);box-shadow:0 0 0 3px rgba(45,122,58,.2); }

  /* ── Ctx Bar ────────────────────────── */
  #ctx-bar {
    flex-shrink: 0;
    height: 32px;
    background: #111120;
    border-bottom: 1px solid #2a2a3e;
    display: flex; align-items: center; gap: 12px;
    padding: 0 14px;
    font-family: var(--font-code); font-size: 12px;
    overflow: hidden;
    position: relative;
  }
  /* barra de progresso de contexto (fundo) */
  #ctx-progress-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, rgba(122,162,247,0.08), rgba(122,162,247,0.04));
    border-right: 1px solid rgba(122,162,247,0.2);
    transition: width 0.4s ease;
    pointer-events: none;
    z-index: 0;
  }
  /* barra de streaming (animada) */
  #ctx-stream-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, transparent, rgba(158,206,106,0.15));
    pointer-events: none;
    z-index: 0;
    transition: width 0.15s linear;
  }
  #ctx-bar > * { position: relative; z-index: 1; }
  .ctx-label { color:#5a5a80; font-weight:700; text-transform:uppercase; letter-spacing:.1em; flex-shrink:0; }
  #ctx-tokens { color:#7aa2f7; flex-shrink:0; font-weight:600; }
  #ctx-tokens.streaming { color:#9ece6a; }
  #ctx-chars  { color:#4a4a6a; flex-shrink:0; }
  #ctx-pct    { color:#3a4a6a; flex-shrink:0; font-size:11px; }
  .ctx-sep { width:1px; height:14px; background:#2a2a3e; flex-shrink:0; }
  #ctx-tps { color:#5a7a5a; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #ctx-resumo-badge { display:none; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; background:#2a2a1a; border:1px solid #6a5a20; color:#e0af68; padding:2px 10px; border-radius:10px; flex-shrink:0; }
  #ctx-resumo-badge.ativo { display:inline-block; }
  #ctx-setup-badge { display:none; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; background:#1a2535; border:1px solid #3a5a7a; color:#7aa2f7; padding:2px 10px; border-radius:10px; flex-shrink:0; animation:pulse 1.2s infinite; }
  #ctx-setup-badge.ativo { display:inline-block; }

  /* ── Corpo principal ─────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Resizers ────────────────────────── */
  .resizer {
    flex-shrink: 0;
    width: 5px;
    background: var(--border);
    cursor: col-resize;
    transition: background .15s;
    position: relative;
    z-index: 5;
  }
  .resizer:hover, .resizer.arrastando { background: var(--accent); }
  .resizer::after {
    content: '';
    position: absolute;
    inset: 0 -4px;  /* área de clique maior que o visual */
  }

  /* ── Sidebar ─────────────────────────── */
  #sidebar {
    width: 240px;
    flex-shrink: 0;
    background: #fafaf7;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title { font-family:var(--font-ui); font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); padding:10px 14px 8px; border-bottom:1px solid var(--border); flex-shrink:0; background:#fff; }
  #tree { flex:1; overflow-y:auto; padding:6px 0; }
  #tree::-webkit-scrollbar { width:4px; }
  #tree::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .tree-node { display:flex;align-items:center;gap:6px;padding:4px 14px;font-size:13.5px;cursor:pointer;white-space:nowrap;overflow:hidden;user-select:none;transition:background .1s;color:var(--text); }
  .tree-node:hover { background:#eaeae4; color:var(--text-hl); }
  .tree-node.ativo { background:#ddeeff; color:var(--accent); border-left:3px solid var(--accent); font-weight:500; }
  .tree-node.dir { color:var(--muted); cursor:default; font-weight:600; }
  .tree-node .icon { flex-shrink:0; font-size:13px; }
  .tree-node .nome { overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .tree-node .tam  { font-size:12px; color:var(--muted); flex-shrink:0; }

  /* ── Editor (centro) ─────────────────── */
  #editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    background: var(--bg);
  }
  #arquivo-tab { height:40px; background:#fff; border-bottom:1.5px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; font-size:14px; flex-shrink:0; }
  #arquivo-nome { color:var(--accent2); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
  
  .view-toggle { display:none; margin-left:10px; background:var(--bg3); border:1.5px solid var(--border); border-radius:5px; overflow:hidden; flex-shrink:0; }
  .view-toggle button { background:transparent; border:none; color:var(--muted); font-family:var(--font-ui); font-size:12px; font-weight:700; text-transform:uppercase; padding:5px 14px; cursor:pointer; transition:all .15s; letter-spacing:.06em; }
  .view-toggle button:hover { color:var(--text); }
  .view-toggle button.ativo { background:var(--accent); color:#fff; }
  
  #preview-zoom-container { display:none; align-items:center; gap:8px; margin-left:12px; flex-shrink:0; }
  #preview-zoom-container span { font-family:var(--font-ui); font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--muted); }
  #zoom-slider { -webkit-appearance:none; width:70px; height:4px; background:var(--border); border-radius:2px; outline:none; }
  #zoom-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:12px; height:12px; border-radius:50%; background:var(--accent); cursor:pointer; }
  
  #arquivo-status { font-size:12px; color:var(--muted); margin-left:auto; white-space:nowrap; flex-shrink:0; }

  /* editor-content ocupa tudo que sobra */
  #editor-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* Mantém scroll do wrapper principal escondido */
    min-height: 0;
    position: relative;
    background: #fff;
  }
  #placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--border); gap:8px; }
  #placeholder .big { font-family:var(--font-ui); font-size:40px; color:var(--border); }
  #placeholder .sub { font-size:14px; color:var(--muted); }

  /* codigo nunca causa scroll no pai */
  #codigo {
    display: none;
    position: absolute;
    inset: 0;
    font-family: var(--font-code); font-size:15px; line-height:1.65; color:var(--text);
    white-space: pre; tab-size:4; counter-reset:linhas;
    overflow: auto;
    padding: 16px 24px; margin: 0; background: #fdfdfa;
  }
  #codigo::-webkit-scrollbar { width:8px; height:8px; }
  #codigo::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  #codigo .linha { display:block; counter-increment:linhas; }
  #codigo .linha::before { content:counter(linhas); display:inline-block; width:42px; color:#b0b0a8; text-align:right; margin-right:18px; user-select:none; font-size:13px; border-right:1px solid #ddddd8; padding-right:10px; }

  /* iframe com suporte a scaling via JS */
  #preview-frame {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
    transform-origin: top left;
  }

  #output-area {
    width: 400px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #1a1a2a;
  }
  .output-header { height:36px; display:flex; align-items:center; padding:0 14px; gap:8px; border-bottom:1px solid #2a2a3e; flex-shrink:0; background:#20203a; }
  .output-header span { font-family:var(--font-ui); font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#5a5a80; }
  #btn-limpar { margin-left:auto; font-size:12px; padding:4px 10px; background:transparent; border-color:#3a3a55; color:#5a5a80; box-shadow:none; }
  #btn-limpar:hover { border-color:#7070a0; color:#a0a0c0; background:transparent; }

  #output { flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:6px; }
  #output::-webkit-scrollbar { width:4px; }
  #output::-webkit-scrollbar-thumb { background:#3a3a55; border-radius:3px; }

  .msg { border-radius:7px; padding:9px 12px; font-size:13.5px; line-height:1.6; word-break:break-word; }

  .msg-falar   { background:#2a2a42; color:#d4d4e8; border-left:3px solid #7c7cf0; font-family:var(--font-ui); font-size:14px; }
  .msg-usuario { background:#2e2040; color:#d4b8e8; border-left:3px solid #c586c0; font-family:var(--font-ui); font-size:14px; }

  .msg-pensar { background:#1e2a1e; color:#6a8a6a; border-left:3px solid #3a5a3a; font-size:13px; }
  .msg-pensar summary { list-style:none; color:#5a7a5a; font-weight:600; margin-bottom:4px; cursor:pointer; font-style:italic; }
  .msg-pensar summary::-webkit-details-marker { display:none; }
  .msg-pensar details[open] summary { color:#7aaa7a; }
  .msg-pensar .pensar-body { margin-top:6px; white-space:pre-wrap; }

  .msg-codar  { background:#1a2535; color:#7aa2f7; border-left:3px solid #7aa2f7; font-family:var(--font-code); font-size:13px; }
  .msg-editar { background:#1a251a; color:#9ece6a; border-left:3px solid #9ece6a; font-family:var(--font-code); font-size:13px; }
  .tag-label  { font-family:var(--font-ui); font-size:11.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; opacity:.7; margin-bottom:4px; }

  .msg-sistema      { color:#4a4a6a; font-size:12.5px; font-family:var(--font-code); padding:2px 0; }
  .msg-sistema.err  { color:#f7768e; }
  .msg-sistema.ok   { color:#9ece6a; }
  .msg-sistema.warn { color:#e0af68; }
  .msg-sistema.sys  { color:#7aa2f7; }

  .msg-tps { color:#3a5a3a; font-size:12px; font-family:var(--font-code); padding:2px 0 2px 8px; border-left:2px solid #2a4a2a; }

  .msg-compact { background:#1e1a10; color:#c8a84a; border-left:3px solid #c8a84a; font-size:13px; font-family:var(--font-code); }
  .msg-compact summary { list-style:none; color:#a88a2a; font-weight:700; margin-bottom:4px; cursor:pointer; font-family:var(--font-ui); font-size:11.5px; text-transform:uppercase; letter-spacing:.1em; }
  .msg-compact summary::-webkit-details-marker { display:none; }
  .msg-compact details[open] summary { color:#e0af68; }
  .msg-compact .compact-body { margin-top:6px; white-space:pre-wrap; line-height:1.7; }

  /* ── Prompt ──────────────────────────── */
  #prompt-area {
    flex-shrink: 0;
    background: #20203a;
    border-top: 1px solid #2a2a3e;
    display: flex; align-items: center;
    padding: 12px 14px; gap: 12px;
  }
  #prompt-input { flex:1; height:56px; background:#2a2a42; border:1.5px solid #3a3a55; color:#d4d4e8; padding:12px 16px; border-radius:6px; font-family:var(--font-code); font-size:14px; resize:none; outline:none; transition:border-color .15s, box-shadow .15s; }
  #prompt-input:focus { border-color:#7c7cf0; box-shadow:0 0 0 3px rgba(124,124,240,.15); background:#2e2e4a; }
  #prompt-input::placeholder { color:#4a4a6a; }
  #btn-enviar { height:56px; padding:0 18px; font-size:13px; border-radius:6px; flex-shrink:0; }

  #status-badge { display:none; align-items:center; gap:6px; font-family:var(--font-ui); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--warn); padding:4px 12px; border-radius:20px; background:#fef4e7; border:1px solid #e8a83a; animation:pulse 1.5s ease-in-out infinite; flex-shrink:0; }
  #status-badge.ativo { display:flex; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
</style>
</head>
<body>

<div id="header">
  <div class="logo">⚙ Lata Velha</div>
  <div class="sep"></div>
  <span id="lbl-projeto">Nenhum projeto selecionado</span>
  <button class="btn" id="btn-pasta" onclick="escolherPasta()">📁 Selecionar Pasta</button>
  <div class="sep"></div>
  <div id="dot"></div>
  <button class="btn run"  id="btn-rodar" onclick="rodar()">▶ Rodar</button>
  <button class="btn stop" id="btn-parar" onclick="parar()" style="display:none">■ Parar</button>
</div>

<div id="ctx-bar">
  <div id="ctx-progress-bar"></div>
  <div id="ctx-stream-bar"></div>
  <span class="ctx-label">CTX</span>
  <span id="ctx-tokens">— tok</span>
  <span id="ctx-pct"></span>
  <span id="ctx-chars"></span>
  <div class="ctx-sep"></div>
  <span id="ctx-tps">aguardando geração…</span>
  <span id="ctx-resumo-badge">C1 resumido</span>
  <span id="ctx-setup-badge">⚙ setup…</span>
</div>

<div id="main">

  <div id="sidebar">
    <div class="sidebar-title">Arquivos</div>
    <div id="tree"><div style="padding:14px;font-size:13px;color:var(--muted)">aguardando projeto…</div></div>
  </div>

  <div class="resizer" id="resizer-left"></div>

  <div id="editor-area">
    <div id="arquivo-tab">
      <span id="arquivo-nome" style="color:var(--muted)">nenhum arquivo</span>
      
      <div class="view-toggle" id="view-toggle">
        <button id="btn-view-code" class="ativo" onclick="setViewMode('code')">Código</button>
        <button id="btn-view-preview" onclick="setViewMode('preview')">Preview</button>
      </div>

      <div id="preview-zoom-container">
        <span>ZOOM</span>
        <input type="range" id="zoom-slider" min="0.25" max="2" step="0.05" value="1" oninput="atualizarZoom(this.value)">
        <span id="zoom-lbl" style="width:30px; text-align:right;">100%</span>
      </div>

      <span id="arquivo-status"></span>
    </div>
    <div id="editor-content">
      <div id="placeholder">
        <div class="big">{ }</div>
        <div class="sub">selecione um arquivo na árvore</div>
      </div>
      <code id="codigo"></code>
      <iframe id="preview-frame"></iframe>
    </div>
  </div>

  <div class="resizer" id="resizer-right"></div>

  <div id="output-area">
    <div class="output-header">
      <span>Conversa &amp; Logs</span>
      <div id="status-badge">⚙ processando…</div>
      <button class="btn" id="btn-limpar" onclick="limparOutput()">limpar</button>
    </div>
    <div id="output"></div>
    <div id="prompt-area">
      <textarea id="prompt-input" placeholder="Diga oi, peça um código, uma mudança… (Enter para enviar, Shift+Enter = nova linha)"></textarea>
      <button class="btn run" id="btn-enviar" onclick="enviarPrompt()">Enviar ↵</button>
    </div>
  </div>

</div>

<script>
const API = 'http://localhost:12314';
let estado = {}, msgsIdx = 0, rodando = false;
let arquivoAtivo = null, arquivoRelativo = null;
let viewMode = 'code', processando = false, ultimoTam = 0;

// ── Zoom Controls ────────────────────────────────────────────────
function atualizarZoom(val) {
  document.getElementById('zoom-lbl').textContent = Math.round(val * 100) + '%';
  const frame = document.getElementById('preview-frame');
  // Aplica o scale pelo transform-origin superior-esquerdo
  frame.style.transform = `scale(${val})`;
  // Compensa largura e altura pro frame ocupar o novo "espaço virtual" sem ser cortado no pai
  frame.style.width = `${100 / val}%`;
  frame.style.height = `${100 / val}%`;
}

// ── Prompt ───────────────────────────────────────────────────────

async function escolherPasta() {
  const btn = document.getElementById('btn-pasta');
  btn.textContent = 'Aguardando…'; btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/escolher_pasta`);
    const res = await r.json();
    if (res.ok) document.getElementById('lbl-projeto').textContent = '📁 ' + res.pasta;
    else if (res.erro) alert("Erro: " + res.erro);
  } catch(e) { console.error(e); }
  btn.textContent = '📁 Selecionar Pasta'; btn.disabled = false;
}

async function enviarPrompt() {
  const el = document.getElementById('prompt-input');
  const txt = el.value.trim();
  if (!txt || processando) return;
  el.value = '';
  setProcessando(true);
  pushMsgUI({ tipo: 'usuario', conteudo: txt });
  try {
    await fetch(`${API}/api/prompt`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt: txt})
    });
  } catch(e) { setProcessando(false); }
}

document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarPrompt(); }
});

function setProcessando(v) {
  processando = v;
  document.getElementById('status-badge').classList.toggle('ativo', v);
  const btn = document.getElementById('btn-enviar');
  btn.disabled = v; btn.textContent = v ? '…' : 'Enviar ↵';
}

// ── Mensagens ────────────────────────────────────────────────────

function pushMsgUI(msg) {
  const out = document.getElementById('output');
  const div = document.createElement('div');

  // ctx_update: atualiza barra em tempo real, não aparece no chat
  if (msg.tipo === 'ctx_update') {
    try {
      const d = JSON.parse(msg.conteudo);
      atualizarCtxBar(null, null, true, d.tokens_novos, d.tps);
    } catch {}
    return;
  }

  if (msg.tipo === 'usuario') {
    div.className = 'msg msg-usuario';
    div.textContent = '▸ ' + msg.conteudo;

  } else if (msg.tipo === 'falar') {
    div.className = 'msg msg-falar';
    div.textContent = msg.conteudo;

  } else if (msg.tipo === 'pensar') {
    div.className = 'msg msg-pensar';
    const det = document.createElement('details');
    const sum = document.createElement('summary');
    sum.textContent = '🧠 pensamento (clique para ver)';
    const body = document.createElement('div');
    body.className = 'pensar-body'; body.textContent = msg.conteudo;
    det.appendChild(sum); det.appendChild(body);
    div.appendChild(det);

  } else if (msg.tipo === 'codar') {
    div.className = 'msg msg-codar';
    const lbl = document.createElement('div'); lbl.className = 'tag-label'; lbl.textContent = '📄 arquivo criado';
    div.appendChild(lbl);
    div.appendChild(document.createTextNode(msg.conteudo));

  } else if (msg.tipo === 'editar') {
    div.className = 'msg msg-editar';
    const lbl = document.createElement('div'); lbl.className = 'tag-label'; lbl.textContent = '✏️ patch aplicado';
    div.appendChild(lbl);
    div.appendChild(document.createTextNode(msg.conteudo));

  } else if (msg.tipo === 'tps') {
    div.className = 'msg msg-tps';
    div.textContent = '⚡ ' + msg.conteudo;
    document.getElementById('ctx-tps').textContent = msg.conteudo;
    // limpa estado de streaming da barra — próximo pollEstado vai atualizar os tokens reais
    document.getElementById('ctx-tokens').classList.remove('streaming');
    document.getElementById('ctx-stream-bar').style.width = '0%';

  } else if (msg.tipo === 'compact') {
    div.className = 'msg msg-compact';
    const det = document.createElement('details');
    const sum = document.createElement('summary');
    sum.textContent = '📦 resumo C1 (clique para ver)';
    const body = document.createElement('div');
    body.className = 'compact-body'; body.textContent = msg.conteudo;
    det.appendChild(sum); det.appendChild(body);
    div.appendChild(det);

  } else {
    div.className = 'msg msg-sistema';
    const l = msg.conteudo.toLowerCase();
    if (msg.conteudo.startsWith('[!]') || l.includes('error') || l.includes('traceback')) div.classList.add('err');
    else if (msg.conteudo.startsWith('[OK]') || msg.conteudo.startsWith('[SALVO') || msg.conteudo.startsWith('[EDITADO]')) div.classList.add('ok');
    else if (msg.conteudo.startsWith('[RODAR]') || msg.conteudo.startsWith('[FIM]') || msg.conteudo.startsWith('===')) div.classList.add('sys');
    else if (msg.conteudo.startsWith('[LLM]') || msg.conteudo.startsWith('[INSTALAR]') || msg.conteudo.startsWith('[AVISO]') || msg.conteudo.startsWith('[TPS]') || msg.conteudo.startsWith('[COMPACT]') || msg.conteudo.startsWith('[SETUP]')) div.classList.add('warn');
    div.textContent = msg.conteudo;
  }

  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

// ── Poll msgs ────────────────────────────────────────────────────

async function pollMsgs() {
  try {
    const r = await fetch(`${API}/api/msgs?desde=${msgsIdx}`);
    const d = await r.json();
    if (d.msgs && d.msgs.length > 0) {
      d.msgs.forEach(m => pushMsgUI(m));
      msgsIdx = d.total;

      // Recarrega árvore e arquivo quando criado/editado
      if (d.msgs.some(m => m.tipo === 'codar' || m.tipo === 'editar')) {
        carregarArvore();
        if (arquivoAtivo) setTimeout(() => carregarArquivo(arquivoAtivo), 400);
      }

      // Detecta fim de processamento
      if (processando) {
        const tipos = d.msgs.map(m => m.tipo);
        if (tipos.some(t => ['falar','codar','editar','sistema'].includes(t))) {
          const ultimos = d.msgs.slice(-3).map(m => m.conteudo).join(' ');
          const terminais = ['[OK]','[SALVO','[EDITADO]','[LLM]','[!]','[FIM]'];
          if (terminais.some(t => ultimos.includes(t)) || tipos.includes('falar') || tipos.includes('codar') || tipos.includes('editar')) {
            setTimeout(() => setProcessando(false), 1000);
          }
        }
      }
    }
  } catch {}
}

function limparOutput() { document.getElementById('output').innerHTML = ''; }

const CTX_MAX = 128000; // limite máximo estimado para a barra (ajuste ao modelo)
let ctxTokensBase = 0;  // tokens do contexto (estado)
let ctxStreaming = false;

function atualizarCtxBar(tokens, chars, streaming, tokensNovos, tps) {
  const el = document.getElementById('ctx-tokens');
  const pct = document.getElementById('ctx-pct');
  const bar = document.getElementById('ctx-progress-bar');
  const sbar = document.getElementById('ctx-stream-bar');

  if (streaming && tokensNovos !== undefined) {
    el.textContent = (ctxTokensBase + tokensNovos).toLocaleString('pt-BR') + ' tok ▸';
    el.classList.add('streaming');
    if (tps) document.getElementById('ctx-tps').textContent = `⚡ ${tps} tok/s`;
    const pctVal = Math.min(100, ((ctxTokensBase + tokensNovos) / CTX_MAX) * 100);
    sbar.style.width = pctVal + '%';
  } else {
    if (tokens) {
      ctxTokensBase = tokens;
      el.textContent = tokens.toLocaleString('pt-BR') + ' tok';
      el.classList.remove('streaming');
      const pctVal = Math.min(100, (tokens / CTX_MAX) * 100);
      bar.style.width = pctVal + '%';
      sbar.style.width = '0%';
      const pctTxt = pctVal >= 1 ? `${pctVal.toFixed(0)}%` : '';
      pct.textContent = pctTxt;
      // Colorir aviso se acima de 70%
      el.style.color = pctVal > 85 ? '#f7768e' : pctVal > 65 ? '#e0af68' : '#7aa2f7';
    }
    if (chars) document.getElementById('ctx-chars').textContent = '(' + (chars / 1024).toFixed(1) + ' KB)';
  }
}

async function pollEstado() {
  try {
    const r = await fetch(`${API}/api/estado`);
    if (!r.ok) return;
    const e = await r.json();

    if (e.pasta_work !== estado.pasta_work) {
      carregarArvore();
      if (e.pasta_orig) document.getElementById('lbl-projeto').textContent = '📁 ' + e.pasta_orig;
    }
    if (e.arquivo !== estado.arquivo && e.arquivo) carregarArquivo(e.arquivo);
    if (e.rodando !== rodando) { rodando = e.rodando; atualizarBotoes(); }
    document.getElementById('dot').className = e.rodando ? 'ativo' : '';

    if (e.ctx_tokens) atualizarCtxBar(e.ctx_tokens, e.ctx_chars, false);
    document.getElementById('ctx-resumo-badge').classList.toggle('ativo', !!e.tem_resumo);
    document.getElementById('ctx-setup-badge').classList.toggle('ativo', !!(e.pasta_work && !e.setup_feito));

    estado = e;
  } catch {}
}

// ── Árvore ───────────────────────────────────────────────────────

async function carregarArvore() {
  try {
    const r = await fetch(`${API}/api/arvore`);
    const nos = await r.json();
    const tree = document.getElementById('tree');
    tree.innerHTML = '';
    renderNos(nos, tree, 0);
  } catch {}
}

function extIcon(nome) {
  const ext = nome.split('.').pop().toLowerCase();
  const m = {py:'🐍',js:'𝙹𝚂',ts:'𝚃𝚂',html:'🌐',css:'🎨',json:'{}',md:'📝',txt:'📄',jpg:'🖼',png:'🖼',svg:'🎭',sh:'⚡'};
  return m[ext] || '·';
}

function renderNos(nos, container, nivel) {
  nos.forEach(no => {
    const div = document.createElement('div');
    div.className = 'tree-node' + (no.tipo === 'dir' ? ' dir' : '');
    div.style.paddingLeft = (14 + nivel * 14) + 'px';
    const icon = document.createElement('span'); icon.className = 'icon'; icon.textContent = no.tipo === 'dir' ? '▸' : extIcon(no.nome);
    const nome = document.createElement('span'); nome.className = 'nome'; nome.textContent = no.nome;
    div.appendChild(icon); div.appendChild(nome);
    if (no.tipo === 'arquivo') {
      const tam = document.createElement('span'); tam.className = 'tam';
      tam.textContent = no.tamanho >= 1024 ? `${(no.tamanho/1024).toFixed(1)}k` : `${no.tamanho}b`;
      div.appendChild(tam);
      if (no.path === estado.arquivo) div.classList.add('ativo');
      div.onclick = () => abrirArquivo(no.path, div);
    }
    container.appendChild(div);
    if (no.tipo === 'dir' && no.filhos?.length > 0) renderNos(no.filhos, container, nivel + 1);
  });
}

async function abrirArquivo(path, el) {
  document.querySelectorAll('.tree-node.ativo').forEach(n => n.classList.remove('ativo'));
  el.classList.add('ativo');
  await fetch(`${API}/api/abrir`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});
  carregarArquivo(path);
}

// ── Editor ───────────────────────────────────────────────────────

async function carregarArquivo(path) {
  if (!path) return;
  arquivoAtivo = path;
  try {
    const r = await fetch(`${API}/api/arquivo?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if (d.erro) return;
    arquivoRelativo = d.rel_path;
    const nome = path.split(/[\\/]/).pop();
    document.getElementById('arquivo-nome').textContent = nome;
    document.getElementById('arquivo-nome').style.color = 'var(--accent2)';
    const isWeb = nome.toLowerCase().endsWith('.html');
    
    document.getElementById('view-toggle').style.display = isWeb ? 'flex' : 'none';
    if (!isWeb) document.getElementById('preview-zoom-container').style.display = 'none';
    
    if (!isWeb && viewMode === 'preview') setViewMode('code');
    renderCodigo(d.conteudo);
    document.getElementById('placeholder').style.display = 'none';
    if (viewMode === 'preview') atualizarPreview();
    const linhas = d.conteudo.split('\n').length;
    document.getElementById('arquivo-status').textContent = `${linhas} linhas · ${(d.conteudo.length/1024).toFixed(1)} KB`;
    ultimoTam = d.conteudo.length;
  } catch {}
}

function renderCodigo(conteudo) {
  const codigo = document.getElementById('codigo');
  codigo.innerHTML = '';
  conteudo.split('\n').forEach((txt, i) => {
    const span = document.createElement('span');
    span.className = 'linha'; span.textContent = txt || ' '; span.dataset.ln = i+1;
    codigo.appendChild(span);
  });
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('btn-view-code').classList.toggle('ativo', mode === 'code');
  document.getElementById('btn-view-preview').classList.toggle('ativo', mode === 'preview');
  
  const codigo = document.getElementById('codigo');
  const frame  = document.getElementById('preview-frame');
  const zoomC  = document.getElementById('preview-zoom-container');
  
  codigo.style.display = mode === 'code'    ? 'block' : 'none';
  frame.style.display  = mode === 'preview' ? 'block' : 'none';
  zoomC.style.display  = mode === 'preview' ? 'flex' : 'none';
  
  if (mode === 'preview') atualizarPreview();
}

function atualizarPreview() {
  if (viewMode === 'preview' && arquivoRelativo) {
    const frame = document.getElementById('preview-frame');
    frame.src = `${API}/${encodeURI(arquivoRelativo)}?t=${Date.now()}`;
    frame.onload = () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        // Permite scroll automático e zera margins pro frame preencher direito
        if (!doc.getElementById('_lv_noscroll')) {
          const s = doc.createElement('style');
          s.id = '_lv_noscroll';
          s.textContent = 'html,body{overflow:auto!important;margin:0!important;}';
          doc.head.appendChild(s);
        }
      } catch {} 
    };
  }
}

// ── Controles ────────────────────────────────────────────────────

async function rodar() { await fetch(`${API}/api/rodar`,{method:'POST'}); rodando=true; atualizarBotoes(); }
async function parar() { await fetch(`${API}/api/parar`,{method:'POST'}); }
function atualizarBotoes() {
  document.getElementById('btn-rodar').style.display = rodando ? 'none' : '';
  document.getElementById('btn-parar').style.display = rodando ? '' : 'none';
}

// ── Auto-refresh ─────────────────────────────────────────────────

async function checkArquivoModificado() {
  if (!arquivoAtivo) return;
  try {
    const r = await fetch(`${API}/api/arquivo?path=${encodeURIComponent(arquivoAtivo)}`);
    const d = await r.json();
    if (!d.erro && d.conteudo.length !== ultimoTam) {
      ultimoTam = d.conteudo.length;
      renderCodigo(d.conteudo);
      const linhas = d.conteudo.split('\n').length;
      document.getElementById('arquivo-status').textContent = `${linhas} linhas · ${(d.conteudo.length/1024).toFixed(1)} KB · ✓`;
      atualizarPreview();
      carregarArvore();
    }
  } catch {}
}

// ── Resizers ─────────────────────────────────────────────────────

const LAYOUT_DEFAULTS = { sidebar: 240, output: 400 };
let layout = { ...LAYOUT_DEFAULTS };

function aplicarLayout() {
  document.getElementById('sidebar').style.width    = layout.sidebar + 'px';
  document.getElementById('output-area').style.width = layout.output + 'px';
}

async function salvarLayout() {
  try {
    await fetch(`${API}/api/layout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(layout)
    });
  } catch {}
}

async function carregarLayout() {
  try {
    const r = await fetch(`${API}/api/layout`);
    if (r.ok) {
      const d = await r.json();
      layout = { ...LAYOUT_DEFAULTS, ...d };
    }
  } catch {}
  aplicarLayout();
}

function iniciarResizer(resizerId, painel, lado) {
  // lado: 'left' = arrasta sidebar, 'right' = arrasta output
  const resizer = document.getElementById(resizerId);
  const el = document.getElementById(painel);
  const main = document.getElementById('main');

  resizer.addEventListener('mousedown', e => {
    e.preventDefault();
    resizer.classList.add('arrastando');
    // bloquear seleção de texto e pointer events no iframe durante drag
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
    const frame = document.getElementById('preview-frame');
    if (frame) frame.style.pointerEvents = 'none';

    const startX = e.clientX;
    const startW = el.offsetWidth;

    function onMove(e) {
      const delta = lado === 'left' ? e.clientX - startX : startX - e.clientX;
      const mainW = main.offsetWidth;
      const minW = 140;
      const maxW = mainW * 0.5;
      const newW = Math.max(minW, Math.min(maxW, startW + delta));
      el.style.width = newW + 'px';
      if (lado === 'left') layout.sidebar = Math.round(newW);
      else layout.output = Math.round(newW);
    }

    function onUp() {
      resizer.classList.remove('arrastando');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      const frame = document.getElementById('preview-frame');
      if (frame) frame.style.pointerEvents = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      salvarLayout();
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Init ─────────────────────────────────────────────────────────

iniciarResizer('resizer-left',  'sidebar',     'left');
iniciarResizer('resizer-right', 'output-area', 'right');
carregarLayout();

setInterval(pollEstado, 2000);
setInterval(pollMsgs,   800);
setInterval(checkArquivoModificado, 1500);
pollEstado(); pollMsgs();
</script>
